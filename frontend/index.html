<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />

    <title>Decampoacampo</title>
  </head>
  <body>
    <header>
      <h1>Lista Producto</h1>
      <button id="btn-add-product">+ Agregar Producto</button>
    </header>
    <main>
      <table id="product-table">
        <thead>
          <tr>
            <th>Nombre</th>
            <th>Descripción</th>
            <th>Precio</th>
            <th>Precio USD</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="product-list"></tbody>
      </table>
    </main>
    <template id="product-row-template">
      <tr data-id="">
        <td class="product-name" data-name="name"></td>
        <td class="product-description" data-name="description"></td>
        <td class="product-price" data-name="price"></td>
        <td class="product-price-usd" data-name="price_usd"></td>
        <td>
          <button class="btn-edit">Editar</button>
          <button class="btn-delete">Eliminar</button>
        </td>
      </tr>
    </template>
    <dialog id="product-dialog">
        <h2 id="dialog-title"></h2>
        <form id="product-form">
            <div class="form-group">
                <input type="hidden" id="product-id" />
                <label for="product-name">Nombre:</label>
                <input type="text" id="product-name" required />
            </div>
            <div class="form-group">
                <label for="product-description">Descripción:</label>
                <textarea id="product-description" required></textarea>
            </div>
            <div class="form-group">
                <label for="product-price">Precio:</label>
                <input type="number" id="product-price" step="0.01" required />
            </div>
            
        </form>   
        <footer>
            <button type="button" id="btn-cancel-product">Cancelar</button>
            <button type="button" id="btn-save-product">Guardar</button>
        </footer>    
    </dialog>
    <dialog id="confirm-dialog">
        <h2>Confirmar Eliminación</h2>
        <p>¿Estás seguro de que deseas eliminar este producto?</p>
        <footer>
            <button type="button" id="btn-cancel-delete">Cancelar</button>
            <button type="button" id="btn-confirm-delete">Eliminar</button>
        </footer>
    </dialog>
    <dialog id="message-dialog">
        <h2 id="message-dialog-title">Error</h2>
        <p id="message-dialog-message"></p>
        <footer>
            <button type="button" id="btn-close-message">Cerrar</button>
        </footer>
    </dialog>
    <script type="module" src="./js/main.js"></script>
  </body>
</html>
